<form id="testForm"
  action="https://crm.zoho.in/crm/WebToLeadForm"
  method="POST"
  accept-charset="UTF-8"
  onsubmit="document.charset='UTF-8';">

  <!-- Auth tokens from Avati-Leads webform -->
  <input type="hidden" name="xnQsjsdp" value="a953c779a14bc6e4957548782b9158470d5e0b96d0d4e9bcf6d98eed4b4824ce">
  <input type="hidden" name="zc_gad" value="">

  <!-- Required fields -->

  <input type="text" name="Company" value="Zoho Test Lead" style="width:100%; padding:8px; margin:5px 0 15px;"><br>

  <label>Last Name*</label><br>
  <input type="text" name="Last Name" value="Test User" style="width:100%; padding:8px; margin:5px 0 15px;"><br>

  <label>Email</label><br>

  <label>Lead Source</label><br>
  <select name="Lead Source" style="width:100%; padding:8px; margin:5px 0 15px;">
    <option value="Online Store" selected>Online Store</option>
  </select><br>

  <label>Lead Status</label><br>
  <select name="Lead Status" style="width:100%; padding:8px; margin:5px 0 15px;">

  </select><br>
